<button onclick="togglePanel()" id="radarToggle" style="
    position: absolute;
    bottom: 10px;
    right: 10px;
    z-index: 10000;
    padding: 10px 15px;
    background-color: #3388ff;
    color: white;
    border: none;
    border-radius: 50px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    font-weight: bold;
    cursor: pointer;
">Radar Menu</button>

<div id="radarPanel" style="
        display: None;
        position: absolute;
        bottom: 60px;
        right: 10px;
        z-index: 9999;
        background-color: white;
        padding: 12px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        font-family: Arial, sans-serif;
        width: 220px;
    ">
        <h4 style="margin-top: 0; margin-bottom: 8px; color: #333; font-size: 16px;">Radar</h4>
        
        <input type="text" id="coordsInput" placeholder="Lat,Lon: 59.33,18.06" step="any" 
               style="width: 100%; margin-bottom: 8px; padding: 8px; font-size: 16px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
               
        <input type="number" id="radarSize" placeholder="km" step="any" 
               style="width: 100%; margin-bottom: 8px; padding: 8px; font-size: 16px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
        
            
        <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px;">
            <div style="display: flex; align-items: center; gap: 6px;">
                <input type="radio" id="fillRadar" name="radar_type" value="fill" checked style="margin: 0; cursor: pointer;">
                <label for="fillRadar" style="font-size: 14px; color: #333; cursor: pointer; margin: 0;">Fill Radar</label>
            </div>
            <div style="display: flex; align-items: center; gap: 6px;">
                <input type="radio" id="invertRadar" name="radar_type" value="invert" style="margin: 0; cursor: pointer;">
                <label for="invertRadar" style="font-size: 14px; color: #333; cursor: pointer; margin: 0;">Inverted Radar</label>
            </div>
        </div>


        <button onclick="plotRadar()" style="
            width: 100%;
            padding: 10px;
            background-color: #3388ff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
        ">Plot Radar</button>
        
        <button onclick="undoRadars()" style="
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            background-color: #666;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
        ">Undo Radar</button>

        <script>
            var activeRadars = [];

            function getFoliumMap() {
                for (var key in window) {
                    if (key.startsWith("map_") && window[key] instanceof L.Map) {
                        return window[key];
                    }
                }
                return null;
            }

            function togglePanel() {
                var panel = document.getElementById('radarPanel');
                var btn = document.getElementById('radarToggle');
                if (panel.style.display === "none") {
                    panel.style.display = "block";
                    btn.innerHTML = "✖ Close";
                    btn.style.backgroundColor = "#ff4444";
                } else {
                    panel.style.display = "none";
                    btn.innerHTML = "Radar Menu";
                    btn.style.backgroundColor = "#3388ff";
                }
            }

            //To draw a perfect circular hole
            function getCirclePoints(lat, lon, radiusMeters) {
                var points = [];
                var earthRadius = 6378137; // Earth's radius in meters
                for (var i = 0; i <= 64; i++) { 
                    var angle = (i * 360 / 64) * (Math.PI / 180);
                    var dy = radiusMeters * Math.sin(angle);
                    var dx = radiusMeters * Math.cos(angle);
                    
                    var pointLat = lat + (dy / earthRadius) * (180 / Math.PI);
                    var pointLon = lon + (dx / earthRadius) * (180 / Math.PI) / Math.cos(lat * Math.PI / 180);
                    points.push([pointLat, pointLon]);
                }
                return points;
            }

            function plotRadar() {
                var rawInput = document.getElementById('coordsInput').value;
                if (!rawInput) {
                    alert("Please enter coordinates.");
                    return;
                }
                
                var parts = rawInput.split(',');
                var lat = parseFloat(parts[0]);
                var lon = parseFloat(parts[1]);
                var size = parseFloat(document.getElementById('radarSize').value);
                
                var radarType = document.querySelector('input[name="radar_type"]:checked').value;
                var myMap = getFoliumMap(); 
                
                if (!myMap) {
                    alert("System Error: Could not find the Folium Map.");
                    return;
                }
                
                if (lat && lon && size) {
                    var radarLayer;

                    if (radarType === "invert") {
                        // rectangular world borer
                        var outerBounds = [[90, -180], [90, 180], [-90, 180], [-90, -180]];
                        // cut-out hole within the rectangle
                        var hole = getCirclePoints(lat, lon, size * 1000);
                        
                        radarLayer = L.polygon([outerBounds, hole], {
                            color: '#3388ff',
                            weight: '1',
                            fillColor: '#3388ff',
                            fillOpacity: 0.3
                        }).addTo(myMap);

                    } else {
                        // Standard Fill Circle
                        radarLayer = L.circle([lat, lon], {
                            color: '#3388ff',
                            weight: '1',
                            fillColor: '#3388ff',
                            fillOpacity: 0.3,
                            radius: size * 1000 
                        }).addTo(myMap); 
                    }
                    
                    activeRadars.push(radarLayer); 
                    myMap.setView([lat, lon], 12); // Auto-zoom to the drop point
                    
                } else {
                    alert("Please enter Lat, Lon, AND Size (km)!");
                }
            }

            function undoRadars() {
                var myMap = getFoliumMap();
                if (!myMap) return;
                var lastRadar = activeRadars.pop();
                myMap.removeLayer(lastRadar);
            }
        </script>
    </div>
